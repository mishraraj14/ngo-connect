<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/volunteer.css}">
</head>

<body>

    <div class="container form-container mt-5">

        <div class="card shadow-lg p-4">
            <h2 class="text-center text-primary mb-4"
                th:text="${volunteer.id == null} ? 'Volunteer Registration' : 'Update Volunteer'">
                Volunteer Registration
            </h2>

            <form th:action="@{/saveVolunteer}" th:object="${volunteer}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" th:field="*{fullName}" placeholder="Enter Full Name"
                        required minlength="3" maxlength="50">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" placeholder="Enter Email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-control" th:field="*{phone}" placeholder="Enter Phone Number"
                        required pattern="[0-9]{10}" maxlength="10">
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" rows="3" th:field="*{address}" placeholder="Enter Address"
                        required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Area of Interest</label>
                    <select class="form-select" th:field="*{skills}" required>
                        <option value="">-- Select Area --</option>
                        <option value="Education">Education</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Environment">Environment</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100"
                    th:text="${volunteer.id == null} ? 'Save Volunteer' : 'Update Volunteer'">
                    Save Volunteer
                </button>

            </form>

            <div class="text-center mt-3">
                <a th:href="@{/volunteers}" class="btn btn-secondary">
                    View Volunteers
                </a>
            </div>

        </div>

    </div>
    <div th:replace="footer :: footer"></div>
</body>

</html>
