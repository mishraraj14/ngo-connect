<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/volunteer.css}">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow-lg p-4">

            <h2 class="text-center text-success mb-4"
                th:text="${donation.id == null} ? 'Donate Now' : 'Update Donation'">
                Donate Now
            </h2>

            <form th:action="@{/saveDonation}" th:object="${donation}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Donor Name</label>
                    <input type="text" class="form-control" th:field="*{donorName}" required minlength="3"
                        maxlength="50">

                    <div class="text-danger" th:if="${#fields.hasErrors('donorName')}" th:errors="*{donorName}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required>

                    <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" th:field="*{phone}" required pattern="[0-9]{10}"
                        maxlength="10">

                    <div class="text-danger" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Donation Amount</label>
                    <input type="number" class="form-control" th:field="*{amount}" required min="1">

                    <div class="text-danger" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Payment Method</label>
                    <select class="form-select" th:field="*{paymentMethod}" required>

                        <option value="">-- Select Payment Method --</option>
                        <option value="UPI">UPI</option>
                        <option value="Card">Card</option>
                        <option value="Net Banking">Net Banking</option>
                        <option value="Cash">Cash</option>

                    </select>

                    <div class="text-danger" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}">
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100"
                    th:text="${donation.id == null} ? 'Donate Now' : 'Update Donation'">
                </button>

            </form>

            <div class="text-center mt-3">
                <a th:href="@{/donations}" class="btn btn-secondary">
                    View Donations
                </a>
            </div>

        </div>

    </div>
    
    <div th:replace="footer :: footer"></div>
</body>

</html>
