<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Event List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="bg-light d-flex flex-column min-vh-100">

<div class="container mt-5 flex-grow-1">

    <h2 class="text-center mb-4">
        Event Management
    </h2>

    <div class="mb-3">
        <a th:href="@{/event}" class="btn btn-success">
            <i class="fa-solid fa-calendar-plus"></i>
            Add Event
        </a>
    </div>

    <!-- Search + Download -->

    <div class="d-flex justify-content-between align-items-center mb-3">

        <form th:action="@{/events}" method="get"
              class="d-flex" style="width:60%;">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search Event..."
                   th:value="${keyword}">

            <button class="btn btn-primary ms-2" type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
                Search
            </button>

        </form>

        <div>

            <a th:href="@{/events/excel}" class="btn btn-success me-2">
                <i class="fa-solid fa-file-excel"></i>
                Excel
            </a>

            <a th:href="@{/events/pdf}" class="btn btn-danger">
                <i class="fa-solid fa-file-pdf"></i>
                PDF
            </a>

        </div>

    </div>

    <table class="table table-bordered table-hover table-striped">

        <thead class="table-dark">
            <tr>
                <th>S.No.</th>
                <th>Event Name</th>
                <th>Date</th>
                <th>Location</th>
                <th>Description</th>
                <th width="180">Action</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="e, stat : ${events}">

                <td th:text="${stat.count}"></td>

                <td th:text="${e.eventName}"></td>
                <td th:text="${e.eventDate}"></td>
                <td th:text="${e.location}"></td>
                <td th:text="${e.description}"></td>

                <td>

                    <a th:href="@{/editEvent/{id}(id=${e.id})}"
                       class="btn btn-warning btn-sm">
                        <i class="fa-solid fa-pen"></i>
                        Edit
                    </a>

                    <a th:href="@{/deleteEvent/{id}(id=${e.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this event?')">
                        <i class="fa-solid fa-trash"></i>
                        Delete
                    </a>

                </td>

            </tr>

        </tbody>

    </table>

    <div class="text-center mt-3 mb-3">

        <a th:href="@{/dashboard}" class="btn btn-dark">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>

    </div>

</div>

<div th:replace="footer :: footer"></div>

</body>

</html>
