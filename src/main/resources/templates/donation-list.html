<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Donation List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="bg-light d-flex flex-column min-vh-100">

<div class="container mt-5 flex-grow-1">

    <h2 class="text-center mb-4">Donation List</h2>

    <div class="mb-3">
        <a th:href="@{/donation}" class="btn btn-success">
            <i class="fa-solid fa-plus"></i>
            New Donation
        </a>
    </div>

    <!-- Search + Download -->

    <div class="d-flex justify-content-between align-items-center mb-3">

        <form th:action="@{/donations}" method="get"
              class="d-flex" style="width:60%;">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Search Donor..."
                   th:value="${keyword}">

            <button class="btn btn-success ms-2" type="submit">
                <i class="fa-solid fa-magnifying-glass"></i>
                Search
            </button>

        </form>

        <div>

            <a th:href="@{/donations/excel}"
               class="btn btn-success me-2">

                <i class="fa-solid fa-file-excel"></i>
                Excel

            </a>

            <a th:href="@{/donations/pdf}"
               class="btn btn-danger">

                <i class="fa-solid fa-file-pdf"></i>
                PDF

            </a>

        </div>

    </div>

    <table class="table table-bordered table-hover table-striped">

        <thead class="table-dark">

            <tr>

                <th>S.No.</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Amount</th>
                <th>Payment</th>
                <th width="180">Action</th>

            </tr>

        </thead>

        <tbody>

            <tr th:each="d, stat : ${donations}">

                <td th:text="${stat.count}"></td>

                <td th:text="${d.donorName}"></td>
                <td th:text="${d.email}"></td>
                <td th:text="${d.phone}"></td>
                <td>₹ <span th:text="${d.amount}"></span></td>
                <td th:text="${d.paymentMethod}"></td>

                <td>

                    <a th:href="@{/editDonation/{id}(id=${d.id})}"
                       class="btn btn-warning btn-sm">

                        <i class="fa-solid fa-pen"></i>
                        Edit

                    </a>

                    <a th:href="@{/deleteDonation/{id}(id=${d.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this donation?')">

                        <i class="fa-solid fa-trash"></i>
                        Delete

                    </a>

                </td>

            </tr>

        </tbody>

    </table>

</div>
<div th:replace="footer :: footer"></div>
</body>

</html>
