<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Volunteer List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <div class="container mt-5 flex-grow-1">

        <h2 class="text-center mb-4">Registered Volunteers</h2>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">

            <span th:text="${success}"></span>

            <button type="button" class="btn-close" data-bs-dismiss="alert">
            </button>

        </div>

        <div class="mb-3">
            <a th:href="@{/volunteer}" class="btn btn-success">
                + New Volunteer
            </a>
        </div>

        <!-- Search + Download -->

        <div class="d-flex justify-content-between align-items-center mb-3">

            <form th:action="@{/volunteers}" method="get" class="d-flex" style="width:60%;">

                <input type="text" name="keyword" class="form-control" placeholder="Search Volunteer..."
                    th:value="${keyword}">

                <button class="btn btn-primary ms-2" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Search
                </button>

            </form>

            <div>

                <a th:href="@{/volunteers/excel}" class="btn btn-success me-2">
                    <i class="fa-solid fa-file-excel"></i>
                    Excel
                </a>

                <a th:href="@{/volunteers/pdf}" class="btn btn-danger">
                    <i class="fa-solid fa-file-pdf"></i>
                    PDF
                </a>

            </div>

        </div>

        <table class="table table-bordered table-hover table-striped">

            <thead class="table-dark">

                <tr>

                    <th>S.No.</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Skills</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

                <tr th:each="v, stat : ${volunteerPage.content}">

                    <td th:text="${stat.count}"></td>
                    <td th:text="${v.fullName}"></td>
                    <td th:text="${v.email}"></td>
                    <td th:text="${v.phone}"></td>
                    <td th:text="${v.address}"></td>
                    <td th:text="${v.skills}"></td>

                    <td>

                        <a th:href="@{/editVolunteer/{id}(id=${v.id})}" class="btn btn-warning btn-sm">
                            Edit
                        </a>

                        <a th:href="@{/deleteVolunteer/{id}(id=${v.id})}" class="btn btn-danger btn-sm"
                            onclick="return confirm('Delete this volunteer?')">
                            Delete
                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <div th:replace="footer :: footer"></div>
</body>

</html>
